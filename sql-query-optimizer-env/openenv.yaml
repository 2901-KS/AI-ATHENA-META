name: sql-query-optimizer
version: 1.0.0
description: >
  A real-world OpenEnv environment where AI agents learn to optimize slow SQL queries
  against a realistic e-commerce database. Agents iteratively rewrite queries and
  suggest indexes to achieve maximum speedup while preserving result correctness.

author: OpenEnv Hackathon Submission
tags:
  - openenv
  - sql
  - optimization
  - real-world
  - e-commerce
  - databases

tasks:
  - id: easy_top_customers
    difficulty: easy
    description: Eliminate correlated subquery to find top 10 customers by 2023 spend
    target_speedup: 3x
    max_steps: 8
    score_range: [0.0, 1.0]

  - id: medium_product_revenue
    difficulty: medium
    description: Optimize multi-table join with missing indexes and redundant subqueries
    target_speedup: 5x
    max_steps: 12
    score_range: [0.0, 1.0]

  - id: hard_cohort_retention
    difficulty: hard
    description: Rewrite quadratic cohort retention query using CTEs and window functions
    target_speedup: 8x
    max_steps: 15
    score_range: [0.0, 1.0]

observation_space:
  type: structured
  fields:
    - name: task_id
      type: string
    - name: task_description
      type: string
    - name: current_query
      type: string
      description: The SQL query to optimize
    - name: original_query
      type: string
      description: The unmodified baseline query
    - name: schema_info
      type: object
      description: Table schemas, row counts, and available indexes
    - name: current_metrics
      type: object
      fields: [execution_time_ms, rows_scanned, rows_returned, query_plan_cost, used_index, result_hash]
    - name: baseline_metrics
      type: object
      description: Performance metrics of the original query
    - name: step_number
      type: integer
    - name: max_steps
      type: integer
    - name: cumulative_reward
      type: float
    - name: hint
      type: string
      nullable: true

action_space:
  type: structured
  fields:
    - name: optimized_query
      type: string
      description: The agent's rewritten SQL SELECT statement
    - name: request_hint
      type: boolean
      description: Request a hint (costs -0.05 reward)
    - name: declare_done
      type: boolean
      description: Signal the agent is satisfied with the optimization
    - name: reasoning
      type: string
      nullable: true
      description: Agent's explanation of the optimization applied

reward:
  type: shaped
  range: [-1.0, 1.0]
  components:
    correctness: 0.40  # result set must match baseline
    performance: 0.40  # scaled by speedup ratio
    plan_cost:   0.20  # query plan cost reduction
    penalties:
      - syntax_error: -0.10
      - hint_used: -0.05
      - per_step: -0.01

environment:
  database: SQLite (in-memory)
  schema: e-commerce (customers, products, orders, order_items, reviews)
  data_size:
    customers: 2000
    products: 500
    orders: 10000
    order_items: 30000
    reviews: 8000

api:
  reset: POST /reset
  step:  POST /step
  state: GET  /state
  grade: POST /grade
  health: GET /health

docker:
  base_image: python:3.11-slim
  port: 7860
  build: docker build -t sql-query-optimizer .
  run: docker run -p 7860:7860 sql-query-optimizer

huggingface:
  space_type: docker
  sdk: docker
  tags: [openenv, sql, optimization, reinforcement-learning]
